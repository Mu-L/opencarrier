<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OpenCarrier — 发现 AI 分身</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f8faf9;color:#333;min-height:100vh;-webkit-font-smoothing:antialiased}
.view{display:none;min-height:100vh}
.view.active{display:flex;flex-direction:column}

/* ── Header ── */
.header{background:#fff;border-bottom:1px solid #eef0f2;padding:12px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.header .brand{font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:-0.5px}
.header .brand span{color:#07c160}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 36px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;outline:none;background:#f8faf9;transition:border-color .2s}
.search-wrap input:focus{border-color:#07c160;background:#fff}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px;pointer-events:none}

/* ── Category Tabs ── */
.cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;border:1.5px solid #e0e0e0;background:#fff;color:#666;flex-shrink:0}
.cat-tab.active{background:#07c160;color:#fff;border-color:#07c160}
.cat-tab:not(.active):hover{border-color:#07c160;color:#07c160}

/* ── Agent List ── */
.agent-list{padding:0 16px 80px}
.section-title{font-size:16px;font-weight:700;color:#1a1a1a;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.section-title .count{font-size:12px;color:#999;font-weight:400}
.agent-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;display:flex;gap:12px;align-items:center;margin-bottom:10px}
.agent-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);transform:translateY(-1px)}
.agent-card:active{transform:translateY(0)}
.agent-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.agent-card .info{flex:1;min-width:0}
.agent-card .info h4{font-size:14px;font-weight:600;color:#333;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-card .info p{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-card .meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.agent-card .installs{font-size:11px;color:#bbb}
.agent-card .arrow{color:#ccc;font-size:14px}
.source-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.source-hub{background:#e8f0fe;color:#3367d6}
.source-local{background:#e8f5eb;color:#07c160}

/* ── Load More ── */
.load-more{text-align:center;padding:12px 0}
.load-more button{background:none;border:1.5px solid #e0e0e0;border-radius:20px;padding:8px 24px;font-size:13px;color:#666;cursor:pointer;transition:all .2s}
.load-more button:hover{border-color:#07c160;color:#07c160}

/* ── Detail View ── */
.detail{padding:0 16px 100px}
.detail-header{display:flex;gap:16px;align-items:center;padding:20px 0}
.detail-avatar{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.detail-header .info h2{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.detail-header .info .cat{font-size:13px;color:#999}
.detail-desc{font-size:14px;color:#666;line-height:1.7;margin-bottom:16px}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{font-size:11px;padding:3px 10px;border-radius:12px;background:#f0f0f0;color:#666}
.detail-stats{display:flex;gap:20px;margin-bottom:20px}
.stat{text-align:center}
.stat .num{font-size:20px;font-weight:700;color:#1a1a1a}
.stat .label{font-size:11px;color:#999}

/* ── Birth Certificate ── */
.birth-cert{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:16px}
.birth-cert h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
#share-img{width:100%;max-width:320px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);display:block;margin:0 auto}
.save-hint{font-size:12px;color:#999;text-align:center;margin-top:8px}

/* ── Bottom Bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eef0f2;padding:12px 16px;z-index:100;display:flex;gap:10px}
.btn-install{flex:1;background:#07c160;color:#fff;border:none;border-radius:24px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(7,193,96,.3)}
.btn-install:hover{background:#06ad56;transform:translateY(-1px)}
.btn-install:active{transform:translateY(0)}
.btn-install:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none}
.btn-back{width:44px;height:44px;border-radius:22px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Auth (Phase 2) ── */
.auth{align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:#fff}
.auth h2{font-size:20px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.auth .sub{font-size:14px;color:#888;margin-bottom:24px}
.auth-status{width:100%;max-width:300px;margin:0 auto}
.spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-status p{font-size:14px;color:#666;line-height:1.6}
.auth-success{color:#07c160;font-size:16px;font-weight:600}
.auth-success .check{font-size:48px;margin-bottom:8px;display:block}
.qr-area{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:inline-block;margin-bottom:16px}
.qr-area img{width:200px;height:200px;border-radius:8px;display:block;image-rendering:pixelated}
.qr-hint{font-size:13px;color:#999;margin-top:12px;line-height:1.6}
.qr-hint .pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#07c160;animation:pulse 1.5s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Done (Phase 3) ── */
.done{align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:linear-gradient(160deg,#f0faf3 0%,#e8f5eb 50%,#f8faf9 100%)}
.done .big-check{font-size:72px;margin-bottom:16px}
.done h2{font-size:24px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
.done p{font-size:15px;color:#666;line-height:1.6;margin-bottom:8px;max-width:340px}
.done .highlight{color:#07c160;font-weight:600}
.done .platform-hint{font-size:13px;color:#999;margin-top:16px;line-height:1.6}
.done .btn-close{margin-top:24px}

/* ── Empty / Loading ── */
.empty{color:#999;font-style:italic;padding:24px;text-align:center}
.loading{text-align:center;padding:32px;color:#999}

.hidden{display:none!important}

/* ── Password ── */
.pw-area{margin:16px 0;width:100%}
.pw-area input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:14px;font-size:15px;outline:none;text-align:center}
.pw-area input:focus{border-color:#07c160}
.pw-error{color:#e08838;font-size:13px;margin-top:8px}
</style>
</head>
<body>

<!-- === View: Home (Agent List) === -->
<div id="v-home" class="view active">
  <div class="header">
    <div class="header-top">
      <div class="brand">Open<span>Carrier</span></div>
    </div>
    <div class="search-wrap">
      <span class="icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="搜索分身名称、描述、标签…" oninput="doSearch()">
    </div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="agent-list" id="agent-list">
    <div class="loading">加载中…</div>
  </div>
</div>

<!-- === View: Detail === -->
<div id="v-detail" class="view">
  <div class="header">
    <div class="header-top">
      <button class="btn-back" onclick="goHome()">&#8592;</button>
      <div class="brand">分身详情</div>
    </div>
  </div>
  <div class="detail" id="detail-content"></div>
  <div class="bottom-bar" id="detail-bottom"></div>
</div>

<!-- === Phase 2: Auth === -->
<div id="v-auth" class="view auth">
  <h2 id="auth-title">授权绑定</h2>
  <p class="sub" id="auth-sub">按提示完成授权，绑定你的 AI 分身</p>
  <div class="auth-status" id="auth-polling">
    <div class="spinner"></div>
    <p id="auth-status-text">正在获取授权链接...</p>
    <p id="auth-debug" style="font-size:11px;color:#bbb;margin-top:8px;word-break:break-all"></p>
  </div>
  <div id="auth-qr" class="hidden">
    <div class="qr-area"><div id="qr-img"></div></div>
    <p class="qr-hint" id="qr-hint">长按识别二维码完成授权</p>
  </div>
  <div id="auth-success" class="auth-success hidden">
    <span class="check">&#9989;</span>
    <p id="auth-success-text">授权成功</p>
  </div>
</div>

<!-- === Phase 3: Done === -->
<div id="v-done" class="view done">
  <div class="big-check">&#127881;</div>
  <h2 id="done-title">绑定成功！</h2>
  <p id="done-desc"></p>
  <div id="done-platform-hint" class="platform-hint"></div>
  <button class="btn-install btn-close" style="max-width:200px;box-shadow:none" onclick="try{WeixinJSBridge.call('closeWindow')}catch(e){};try{window.close()}catch(e){};">关闭页面</button>
</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var cloneName = params.get('clone') || '';
  var activePlatform = '';
  var ua = navigator.userAgent;
  if (/wxwork/i.test(ua)) activePlatform = 'wecom';
  else if (/MicroMessenger/i.test(ua)) activePlatform = 'weixin';
  else if (/DingTalk/i.test(ua)) activePlatform = 'dingtalk';
  else if (/Feishu|Lark/i.test(ua)) activePlatform = 'feishu';
  else { try { activePlatform = localStorage.getItem('oc_active_platform') || ''; } catch(e) {} }
  if (!activePlatform) activePlatform = 'weixin';

  var currentBotId = '';
  var platformCredentials = {};
  var targetAgentName = cloneName;
  var cloneAccess = 'public';
  var accessVerified = false;
  var pollTimer = null;
  var allAgents = [];
  var activeCategory = 'all';
  var PER_PAGE = 20;
  var categoryPages = {};

  var categoryLabels = {
    'all': '全部',
    'hot': '热门',
    'assistant': '助手',
    'coder': '编程',
    'researcher': '研究',
    'writer': '写作',
    'analyst': '分析',
    'support': '客服',
    'devops': '运维',
    'creative': '创意',
    'education': '教育',
    'finance': '金融',
    'healthcare': '医疗',
    'legal': '法律',
    'marketing': '营销',
  };

  var platformConfig = {
    weixin:  { label: '微信',     color: '#07c160' },
    wecom:   { label: '企业微信', color: '#07c160' },
    feishu:  { label: '飞书',     color: '#3370ff' },
    dingtalk:{ label: '钉钉',     color: '#0089ff' },
  };

  // ── localStorage ──
  function savePendingAuth(state) {
    state.ts = Date.now();
    try { localStorage.setItem('oc_pending_auth', JSON.stringify(state)); } catch(e) {}
  }
  function loadPendingAuth() {
    try {
      var s = localStorage.getItem('oc_pending_auth');
      if (!s) return null;
      var p = JSON.parse(s);
      if (p.ts && Date.now() - p.ts > 600000) { clearPendingAuth(); return null; }
      return p;
    } catch(e) { return null; }
  }
  function clearPendingAuth() {
    try { localStorage.removeItem('oc_pending_auth'); } catch(e) {}
  }

  // ── Helpers ──
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function getColor(agent) {
    return agent.color || (agent.source === 'hub' ? '#3367d6' : '#07c160');
  }

  function getInitial(agent) {
    if (agent.identity && agent.identity.emoji) return agent.identity.emoji;
    var name = agent.display_name || agent.name || '';
    var map = {'customer-service':'🎧','writer':'✍️','analyst':'📊','assistant':'🤖','translator':'🌐','coder':'💻','researcher':'🔬','devops':'⚙️','support':'🎧','creative':'🎨','education':'📚','finance':'💰','healthcare':'🏥','legal':'⚖️','marketing':'📣'};
    var n = (agent.category || name).toLowerCase();
    for (var k in map) { if (n.indexOf(k) >= 0) return map[k]; }
    var emojis = ['🤖','🧠','💡','🌟','🎯','🔮','🦾','✨'];
    var h = 0; for (var i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
    return emojis[Math.abs(h) % emojis.length];
  }

  function showView(n) {
    document.querySelectorAll('.view').forEach(function(p){p.classList.remove('active')});
    document.getElementById('v-'+n).classList.add('active');
    window.scrollTo(0,0);
  }

  function api(method, path, body) {
    var opts = { method: method, headers: {'Content-Type': 'application/json'}, credentials: 'same-origin' };
    if (body) opts.body = JSON.stringify(body);
    var controller = new AbortController();
    opts.signal = controller.signal;
    var timeout = setTimeout(function(){ controller.abort(); }, 30000);
    return fetch(path, opts).then(function(r){
      clearTimeout(timeout);
      if (r.status >= 400) throw new Error('HTTP ' + r.status);
      return r.json().catch(function(){ return {}; });
    }).catch(function(e){ clearTimeout(timeout); throw e; });
  }

  function stopPoll() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }

  function formatCount(n) {
    if (!n) return '0';
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  // ── Home: Load agents ──
  function initHome() {
    var pending = loadPendingAuth();
    if (pending) {
      targetAgentName = pending.agentName;
      activePlatform = pending.platform;
      resumeAuth(pending);
      return;
    }

    api('GET', '/api/share/agents').then(function(res){
      allAgents = res.agents || [];
      // Sort by install_count descending
      allAgents.sort(function(a, b) { return (b.install_count || 0) - (a.install_count || 0); });
      buildCategoryTabs();
      renderAgentList();
    }).catch(function(e){
      document.getElementById('agent-list').innerHTML = '<div class="empty">加载失败</div>';
    });
  }

  // ── Category tabs ──
  function buildCategoryTabs() {
    var cats = {};
    allAgents.forEach(function(a) {
      var cat = (a.category || 'other').toLowerCase();
      cats[cat] = (cats[cat] || 0) + 1;
    });

    var tabs = ['all', 'hot'];
    // Sort categories by count
    var sorted = Object.keys(cats).sort(function(a, b) { return cats[b] - cats[a]; });
    sorted.forEach(function(c) {
      if (c !== 'other' && tabs.indexOf(c) < 0) tabs.push(c);
    });
    if (cats['other']) tabs.push('other');

    var html = '';
    tabs.forEach(function(c) {
      var label = categoryLabels[c] || c;
      var count = c === 'hot' ? Math.min(allAgents.length, PER_PAGE) : (c === 'all' ? allAgents.length : (cats[c] || 0));
      var cls = c === activeCategory ? 'cat-tab active' : 'cat-tab';
      html += '<button class="' + cls + '" data-cat="' + c + '" onclick="switchCategory(\'' + c + '\')">' + label + '</button>';
    });
    document.getElementById('cat-tabs').innerHTML = html;
  }

  window.switchCategory = function(cat) {
    activeCategory = cat;
    categoryPages = {};
    document.querySelectorAll('.cat-tab').forEach(function(b){ b.classList.remove('active'); });
    var el = document.querySelector('.cat-tab[data-cat="' + cat + '"]');
    if (el) el.classList.add('active');
    renderAgentList();
  };

  // ── Search ──
  window.doSearch = function() {
    renderAgentList();
  };

  function getFilteredAgents() {
    var q = (document.getElementById('search-input').value || '').trim().toLowerCase();
    var filtered = allAgents;

    if (q) {
      filtered = allAgents.filter(function(a) {
        var text = ((a.display_name || '') + ' ' + (a.description || '') + ' ' + (a.tags || []).join(' ') + ' ' + (a.category || '')).toLowerCase();
        return text.indexOf(q) >= 0;
      });
    }

    if (activeCategory === 'hot') {
      return filtered.slice(0, PER_PAGE);
    }
    if (activeCategory !== 'all') {
      filtered = filtered.filter(function(a) {
        var cat = (a.category || 'other').toLowerCase();
        return cat === activeCategory;
      });
    }
    return filtered;
  }

  // ── Render agent list ──
  function renderAgentList() {
    var filtered = getFilteredAgents();
    var el = document.getElementById('agent-list');

    if (!filtered.length) {
      el.innerHTML = '<div class="empty">没有找到分身</div>';
      return;
    }

    var html = '';

    if (activeCategory === 'all' || document.getElementById('search-input').value.trim()) {
      // Show grouped by category
      if (!document.getElementById('search-input').value.trim()) {
        // Hot section
        var hot = allAgents.slice(0, PER_PAGE);
        html += renderSection('热门', hot, 'hot');
        // Other categories
        var grouped = {};
        filtered.forEach(function(a) {
          var cat = (a.category || 'other').toLowerCase();
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(a);
        });
        var catOrder = Object.keys(grouped).sort(function(a, b) { return grouped[b].length - grouped[a].length; });
        catOrder.forEach(function(cat) {
          var label = categoryLabels[cat] || cat;
          html += renderSection(label, grouped[cat], cat);
        });
      } else {
        // Search results - flat list
        html += renderCards(filtered);
      }
    } else if (activeCategory === 'hot') {
      html += renderCards(filtered);
    } else {
      html += renderCards(filtered);
    }

    el.innerHTML = html;
  }

  function renderSection(title, agents, catKey) {
    var shown = agents.slice(0, PER_PAGE);
    var html = '<div class="section-title">' + esc(title) + ' <span class="count">' + agents.length + '</span></div>';
    html += renderCards(shown);
    if (agents.length > PER_PAGE) {
      html += '<div class="load-more"><button onclick="loadMoreCategory(\'' + catKey + '\')">查看更多 (' + (agents.length - PER_PAGE) + ')</button></div>';
    }
    return html;
  }

  function renderCards(agents) {
    var html = '';
    agents.forEach(function(a) {
      var displayName = a.display_name || a.name || '';
      var desc = a.description || '';
      var color = getColor(a);
      var initial = getInitial(a);
      var sourceBadge = a.source === 'hub' ? '<span class="source-badge source-hub">Hub</span>' : '<span class="source-badge source-local">本地</span>';
      var inst = a.install_count ? '<span class="installs">&#11015; ' + formatCount(a.install_count) + '</span>' : '';
      html += '<div class="agent-card" onclick="openDetail(\'' + esc(a.name) + '\')">' +
        '<div class="agent-avatar" style="background:' + color + '20;color:' + color + '">' + initial + '</div>' +
        '<div class="info"><h4>' + esc(displayName) + '</h4><p>' + esc(desc) + '</p></div>' +
        '<div class="meta">' + sourceBadge + inst + '<span class="arrow">&#8250;</span></div>' +
      '</div>';
    });
    return html;
  }

  window.loadMoreCategory = function(catKey) {
    // For now, just show all (simple pagination can be added later)
    switchCategory(catKey === 'hot' ? 'all' : catKey);
  };

  // ── Detail View ──
  window.openDetail = function(name) {
    var agent = allAgents.find(function(a) { return a.name === name; });
    if (!agent) return;

    targetAgentName = name;
    var displayName = agent.display_name || agent.name || '';
    var desc = agent.description || '';
    var color = getColor(agent);
    var initial = getInitial(agent);
    var cat = agent.category || '';
    var catLabel = categoryLabels[(cat || '').toLowerCase()] || cat;
    var tags = agent.tags || [];
    var installs = agent.install_count || 0;

    var tagsHtml = tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('');
    if (cat) tagsHtml = '<span class="tag" style="background:' + color + '18;color:' + color + '">' + esc(catLabel || cat) + '</span>' + tagsHtml;

    var content = document.getElementById('detail-content');
    content.innerHTML =
      '<div class="detail-header">' +
        '<div class="detail-avatar" style="background:' + color + '20;color:' + color + '">' + initial + '</div>' +
        '<div class="info"><h2>' + esc(displayName) + '</h2>' +
        (catLabel ? '<div class="cat">' + esc(catLabel) + '</div>' : '') +
      '</div></div>' +
      '<div class="detail-desc">' + esc(desc) + '</div>' +
      (tagsHtml ? '<div class="detail-tags">' + tagsHtml + '</div>' : '') +
      '<div class="detail-stats">' +
        '<div class="stat"><div class="num">' + formatCount(installs) + '</div><div class="label">安装</div></div>' +
        '<div class="stat"><div class="num">' + esc(agent.source === 'hub' ? 'Hub' : '本地') + '</div><div class="label">来源</div></div>' +
      '</div>' +
      '<div class="birth-cert">' +
        '<h3>分身出生证</h3>' +
        '<canvas id="cert-canvas" style="display:none"></canvas>' +
        '<img id="share-img" style="display:none">' +
        '<div id="cert-loading" style="text-align:center;padding:20px;color:#999">生成中…</div>' +
        '<div class="save-hint" id="cert-hint" style="display:none">长按图片保存分享</div>' +
      '</div>';

    // Bottom bar
    document.getElementById('detail-bottom').innerHTML =
      '<button class="btn-back" onclick="goHome()">&#10005;</button>' +
      '<button class="btn-install" id="btn-install" onclick="startAuth()">安装分身</button>';

    showView('detail');
    generateBirthCert(agent);
  };

  window.goHome = function() {
    showView('home');
  };

  // ── Birth Certificate Canvas ──
  function generateBirthCert(agent) {
    var canvas = document.createElement('canvas');
    var scale = 2;
    var cw = 340;
    var pad = 28;
    var qrSize = 140;
    var color = getColor(agent);
    var displayName = agent.display_name || agent.name || '';
    var desc = (agent.description || '').substring(0, 80);
    var shareUrl = location.origin + '/share?clone=' + encodeURIComponent(agent.name);

    // Measure text
    var ctx = canvas.getContext('2d');
    ctx.font = 'bold 20px -apple-system,sans-serif';
    var titleLines = wrapLines(displayName, cw - pad * 2, ctx, 2);
    ctx.font = '13px -apple-system,sans-serif';
    var descLines = wrapLines(desc, cw - pad * 2, ctx, 3);

    var titleH = titleLines.length * 26;
    var descH = descLines.length * 20;
    var totalH = pad + 8 + titleH + 6 + descH + 20 + qrSize + 16 + 20 + 16 + pad;

    canvas.width = cw * scale;
    canvas.height = totalH * scale;
    ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    // Background
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, 0, 0, cw, totalH, 16);
    ctx.fill();

    // Top accent bar
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, cw, 5);

    // Initial
    var initial = getInitial(agent);
    ctx.font = '36px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    var y = pad + 8 + 28;

    // Title
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 20px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    titleLines.forEach(function(line) {
      ctx.fillText(line, cw / 2, y);
      y += 26;
    });

    y += 6;

    // Description
    ctx.fillStyle = '#888888';
    ctx.font = '13px -apple-system,sans-serif';
    descLines.forEach(function(line) {
      ctx.fillText(line, cw / 2, y + 14);
      y += 20;
    });

    y += 20;

    // QR code
    var qrX = (cw - qrSize) / 2;
    if (typeof qrcode === 'function') {
      try {
        var qr = qrcode(0, 'M');
        qr.addData(shareUrl);
        qr.make();
        var qrImg = new Image();
        var qrDataUrl = 'data:image/gif;base64,' + qr.createDataURL(3, 0);
        qrImg.onload = function() {
          ctx.drawImage(qrImg, qrX, y, qrSize, qrSize);
          finishCert();
        };
        qrImg.src = qrDataUrl;
      } catch(e) {
        finishCert();
      }
    } else {
      finishCert();
    }

    function finishCert() {
      y += qrSize + 16;

      // "扫码安装分身"
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '15px -apple-system,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('扫码安装分身', cw / 2, y + 14);
      y += 26;

      // Footer
      ctx.fillStyle = '#aaaaaa';
      ctx.font = '11px -apple-system,sans-serif';
      ctx.fillText('OpenCarrier', cw / 2, y + 10);

      // Show image
      var imgEl = document.getElementById('share-img');
      if (imgEl) {
        imgEl.src = canvas.toDataURL('image/png');
        imgEl.style.display = 'block';
      }
      var loading = document.getElementById('cert-loading');
      if (loading) loading.style.display = 'none';
      var hint = document.getElementById('cert-hint');
      if (hint) hint.style.display = 'block';
    }
  }

  function wrapLines(text, maxWidth, ctx, maxLines) {
    if (!text) return [];
    var lines = [];
    var line = '';
    for (var i = 0; i < text.length; i++) {
      var test = line + text[i];
      if (ctx.measureText(test).width > maxWidth) {
        if (line) lines.push(line);
        line = text[i];
        if (lines.length >= maxLines) {
          if (lines.length > 0) lines[lines.length - 1] += '…';
          return lines;
        }
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── If clone= param, go directly to detail ──
  function checkDirectClone() {
    if (!cloneName) return false;
    // Wait for agents to load, then open detail
    if (!allAgents.length) return true; // still loading
    var agent = allAgents.find(function(a) { return a.name === cloneName; });
    if (agent) {
      openDetail(cloneName);
      return true;
    }
    // Agent not found in list, show hero
    return false;
  }

  // ── Password ──
  window.verifyPassword = function() {
    var pw = document.getElementById('clone-password').value.trim();
    if (!pw) return;
    var errEl = document.getElementById('pw-error');
    var btn = document.getElementById('btn-install');
    btn.disabled = true;
    btn.textContent = '验证中...';
    errEl.textContent = '';
    api('POST', '/api/clones/' + encodeURIComponent(cloneName) + '/verify-access', {password: pw}).then(function(data){
      if (data.ok) {
        accessVerified = true;
        cloneAccess = 'public';
        var pwArea = document.querySelector('.pw-area');
        if (pwArea) pwArea.style.display = 'none';
        btn.textContent = '安装分身';
        btn.disabled = false;
        btn.onclick = function(){ startAuth(); };
      } else {
        errEl.textContent = data.error || '密码错误';
        btn.textContent = '安装分身';
        btn.disabled = false;
      }
    }).catch(function(e){
      errEl.textContent = '验证失败: ' + e.message;
      btn.textContent = '安装分身';
      btn.disabled = false;
    });
  };

  // ── Auth ──
  window.startAuth = function() {
    if (!targetAgentName && !cloneName) { alert('分身名称缺失'); return; }
    if (!targetAgentName) targetAgentName = cloneName;
    if (cloneAccess === 'private' && !accessVerified) {
      verifyPassword();
      return;
    }
    beginAuth(activePlatform);
  };

  function beginAuth(platform) {
    showView('auth');
    var cfg = platformConfig[platform] || {};
    document.getElementById('auth-title').textContent = cfg.label + '授权绑定';
    document.getElementById('auth-polling').classList.remove('hidden');
    document.getElementById('auth-success').classList.add('hidden');
    document.getElementById('auth-status-text').textContent = '正在获取授权链接...';

    if (platform === 'weixin') {
      api('GET', '/api/weixin/qrcode').then(function(data){
        if (data.error) throw new Error(data.error);
        var qrContent = (data.data || {}).qrcode_img_content || '';
        var qrcodeToken = (data.data || {}).qrcode || '';
        var tenant = data.tenant || 'share';
        document.getElementById('auth-polling').classList.add('hidden');
        document.getElementById('auth-qr').classList.remove('hidden');
        if (qrContent && typeof qrcode === 'function') {
          try {
            var qr = qrcode(0, 'M');
            qr.addData(qrContent);
            qr.make();
            document.getElementById('qr-img').innerHTML = qr.createImgTag(6, 8);
            var img = document.getElementById('qr-img').querySelector('img');
            if (img) { img.style.width = '200px'; img.style.height = '200px'; img.style.imageRendering = 'pixelated'; img.style.borderRadius = '8px'; }
          } catch(e) {
            document.getElementById('qr-img').innerHTML = '<p style="color:#999;font-size:13px">二维码生成失败</p>';
          }
        }
        pollWeixin(qrcodeToken, tenant);
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + e.message;
      });
    } else if (platform === 'wecom') {
      api('POST', '/api/senders/wecom/smartbot/generate', { agent_name: targetAgentName }).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'wecom', agentName: targetAgentName, sessionData: { scode: res.scode } });
        location.href = res.auth_url;
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    } else if (platform === 'feishu') {
      api('POST', '/api/senders/feishu/device-auth', { agent_name: targetAgentName }).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'feishu', agentName: targetAgentName, sessionData: { session_id: res.session_id } });
        document.getElementById('auth-status-text').textContent = '正在跳转飞书授权...';
        location.href = res.auth_url;
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    } else if (platform === 'dingtalk') {
      api('POST', '/api/senders/dingtalk/device-auth', { agent_name: targetAgentName }).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'dingtalk', agentName: targetAgentName, sessionData: { session_id: res.session_id } });
        document.getElementById('auth-status-text').textContent = '正在跳转钉钉授权...';
        location.href = res.auth_url;
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    }
  }

  // ── Resume auth ──
  function resumeAuth(pending) {
    showView('auth');
    var cfg = platformConfig[pending.platform] || {};
    document.getElementById('auth-title').textContent = cfg.label + '授权绑定';
    document.getElementById('auth-polling').classList.remove('hidden');
    document.getElementById('auth-success').classList.add('hidden');
    document.getElementById('auth-status-text').textContent = '正在验证' + cfg.label + '授权结果...';
    var sd = pending.sessionData || {};
    if (pending.platform === 'weixin') {
      clearPendingAuth(); initHome(); return;
    }
    else if (pending.platform === 'wecom') pollWecom(sd.scode);
    else if (pending.platform === 'feishu') pollFeishu(sd.session_id);
    else if (pending.platform === 'dingtalk') pollDingtalk(sd.session_id);
  }

  // ── Poll error helper ──
  function makePollCatch(label, started) {
    var errCount = 0;
    return function(e) {
      errCount++;
      var msg = (e && e.message) || String(e);
      var dbgEl = document.getElementById('auth-debug');
      if (dbgEl) dbgEl.textContent = label + ' ERR#' + errCount + ': ' + msg;
      if (msg.indexOf('HTTP 400') >= 0) {
        stopPoll(); clearPendingAuth(); showAuthTimeout('会话已失效，请重新授权');
        return;
      }
      if (errCount >= 5) {
        stopPoll(); clearPendingAuth(); showAuthTimeout('连接失败，请重试');
      }
    };
  }

  // ── WeChat poll ──
  function pollWeixin(qrcode, tenant) {
    var started = Date.now();
    var errHandler = makePollCatch('weixin', started);
    function doPoll() {
      var url = '/api/weixin/qrcode-status?tenant=' + encodeURIComponent(tenant);
      if (qrcode) url += '&qrcode=' + encodeURIComponent(qrcode);
      if (targetAgentName) url += '&agent_name=' + encodeURIComponent(targetAgentName);
      api('GET', url).then(function(data){
        var status = data.status || (data.data && data.data.status);
        if (status === 'confirmed' || status === 'scaned_confirmed') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('微信授权成功');
          showDone();
        } else if (status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, 2000);
  }

  // ── WeCom poll ──
  function pollWecom(scode) {
    var started = Date.now();
    var errHandler = makePollCatch('wecom', started);
    function doPoll() {
      api('GET', '/api/senders/wecom/smartbot/poll?scode=' + encodeURIComponent(scode)).then(function(res){
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('企业微信授权成功');
          showDone();
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, 2000);
  }

  // ── Feishu poll ──
  function pollFeishu(sessionId) {
    var interval = 3000;
    var started = Date.now();
    var errHandler = makePollCatch('feishu', started);
    function doPoll() {
      api('GET', '/api/senders/feishu/device-auth/poll?session_id=' + encodeURIComponent(sessionId)).then(function(res){
        var elapsed = Math.round((Date.now() - started) / 1000);
        var dbgEl = document.getElementById('auth-debug');
        if (dbgEl) dbgEl.textContent = 'feishu poll (' + elapsed + 's) ' + JSON.stringify(res).substring(0, 200);
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('飞书授权成功');
          platformCredentials.feishu = { app_id: res.app_id || '', app_secret: res.app_secret || '' };
          createBotAndBind('feishu');
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        } else if (res.raw_feishu && res.raw_feishu.error === 'slow_down') {
          interval = Math.min(interval + 2000, 10000); stopPoll();
          pollTimer = setInterval(doPoll, interval);
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, interval);
  }

  // ── DingTalk poll ──
  function pollDingtalk(sessionId) {
    var interval = 3000;
    var started = Date.now();
    var errHandler = makePollCatch('dingtalk', started);
    function doPoll() {
      api('GET', '/api/senders/dingtalk/device-auth/poll?session_id=' + encodeURIComponent(sessionId)).then(function(res){
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('钉钉授权成功');
          platformCredentials.dingtalk = { client_id: res.client_id || '', client_secret: res.client_secret || '' };
          createBotAndBind('dingtalk');
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        } else if (res.raw_dingtalk && res.raw_dingtalk.error === 'slow_down') {
          interval = Math.min(interval + 2000, 10000); stopPoll();
          pollTimer = setInterval(doPoll, interval);
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, interval);
  }

  function showAuthSuccess(text) {
    document.getElementById('auth-polling').classList.add('hidden');
    document.getElementById('auth-qr').classList.add('hidden');
    document.getElementById('auth-success').classList.remove('hidden');
    document.getElementById('auth-success-text').textContent = text;
  }

  function showAuthTimeout(reason) {
    stopPoll();
    clearPendingAuth();
    document.getElementById('auth-polling').classList.add('hidden');
    document.getElementById('auth-qr').classList.add('hidden');
    document.getElementById('auth-success').classList.remove('hidden');
    document.getElementById('auth-success').innerHTML =
      '<span style="font-size:48px;display:block;margin-bottom:8px">&#9203;</span>' +
      '<p style="color:#e08838;font-size:16px;font-weight:600">' + reason + '</p>' +
      '<p style="color:#999;font-size:13px;margin-top:8px">点击下方按钮重新授权</p>' +
      '<button class="btn-install" id="btn-retry" style="margin-top:16px;max-width:200px">重新开始</button>';
    document.getElementById('btn-retry').addEventListener('click', function(){
      document.getElementById('auth-success').classList.add('hidden');
      document.getElementById('auth-success').innerHTML = '<span class="check">&#9989;</span><p id="auth-success-text">授权成功</p>';
      showView('home');
      initHome();
    });
  }

  // ── Create bot and bind ──
  function createBotAndBind(platform, weixinBotName, ilinkData) {
    var botName = targetAgentName + '-' + platform;
    var payload = { name: botName, platform: platform };

    if (platform === 'weixin') {
      payload.mode = 'ilink';
      if (ilinkData && ilinkData.ilink_user_id) payload.ilink_user_id = ilinkData.ilink_user_id;
      if (ilinkData && ilinkData.bot_token) payload.bot_token = ilinkData.bot_token;
    } else if (platform === 'wecom') {
      payload.mode = 'smartbot';
      var c = platformCredentials.wecom || {};
      if (c.bot_id) payload.bot_id = c.bot_id;
      if (c.secret) payload.secret = c.secret;
    } else if (platform === 'feishu') {
      var fc = platformCredentials.feishu || {};
      if (fc.app_id) payload.app_id = fc.app_id;
      if (fc.app_secret) payload.app_secret = fc.app_secret;
      payload.brand = 'feishu';
    } else if (platform === 'dingtalk') {
      var dc = platformCredentials.dingtalk || {};
      if (dc.client_id) payload.app_key = dc.client_id;
      if (dc.client_secret) payload.app_secret = dc.client_secret;
    }

    if (platform === 'weixin' && ilinkData && ilinkData.bot_token) {
      api('POST', '/api/weixin/save-token', {
        tenant_name: weixinBotName, bot_token: ilinkData.bot_token,
        ilink_bot_id: ilinkData.ilink_bot_id, ilink_user_id: ilinkData.ilink_user_id,
        baseurl: ilinkData.baseurl
      }).catch(function(){});
    }

    api('POST', '/api/senders', payload).then(function(res){
      currentBotId = res.bot_id || '';
      bindClone(platform, weixinBotName);
    }).catch(function(){
      bindClone(platform, weixinBotName);
    });
  }

  function bindClone(platform, weixinBotName) {
    var bindUrl, method;
    if (platform === 'weixin' && weixinBotName) {
      bindUrl = '/api/weixin/' + encodeURIComponent(weixinBotName) + '/bind';
      method = 'POST';
    } else if (currentBotId) {
      bindUrl = '/api/senders/' + encodeURIComponent(currentBotId) + '/bind';
      method = 'PUT';
    } else { showDone(); return; }

    api(method, bindUrl, { agent_name: targetAgentName }).then(function(){
      showDone();
    }).catch(function(){ showDone(); });
  }

  function showDone() {
    document.getElementById('done-title').textContent = '绑定成功！';
    document.getElementById('done-desc').innerHTML =
      '你已成功绑定分身 <span class="highlight">' + esc(targetAgentName) + '</span>';
    var hints = {
      weixin: '返回微信聊天窗口，给机器人发条消息，分身就会回复你。<br><span style="color:#e08838">微信需每 24 小时内至少发一条消息保持在线</span>',
      wecom: '返回企业微信聊天窗口，给机器人发条消息开始对话',
      feishu: '返回飞书聊天窗口，给机器人发条消息开始对话',
      dingtalk: '返回钉钉聊天窗口，给机器人发条消息开始对话',
    };
    document.getElementById('done-platform-hint').innerHTML = hints[activePlatform] || '';
    setTimeout(function(){ showView('done'); }, 800);
  }

  // ── Init ──
  initHome();
})();
</script>
