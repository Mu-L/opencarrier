<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}OpenCarrier{% endblock %}</title>
<link rel="icon" type="image/png" href="/logo.png">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface-hover: #252540;
    --border: #2a2a45;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --success: #22c55e;
    --error: #ef4444;
    --warning: #f59e0b;
    --radius: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent-hover); }

  /* Sidebar */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-header img { border-radius: 6px; }
  .sidebar-header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .sidebar-header .version {
    font-size: 11px;
    color: var(--text-dim);
  }
  .sidebar-nav {
    flex: 1;
    padding: 8px 0;
    overflow-y: auto;
  }
  .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    color: var(--text-dim);
    font-size: 14px;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .sidebar-nav a:hover {
    background: var(--surface-hover);
    color: var(--text);
  }
  .sidebar-nav a.active {
    background: var(--surface-hover);
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .sidebar-nav a svg {
    width: 18px; height: 18px;
    fill: none; stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }
  .sidebar-footer a { font-size: 12px; }

  /* Main content */
  .main {
    margin-left: 200px;
    min-height: 100vh;
    padding: 24px 32px;
  }
  .page-header {
    margin-bottom: 24px;
  }
  .page-header h2 {
    font-size: 22px;
    font-weight: 600;
  }
  .page-header p {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card h3 {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  th {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    font-weight: 600;
  }
  tr:hover td { background: var(--surface-hover); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--surface-hover); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Forms */
  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--success); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: var(--warning); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--error); }

  /* Login page */
  .login-page {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin-left: 0;
    background: linear-gradient(135deg, var(--bg) 0%, #1a1a35 100%);
  }
  .login-box {
    width: 100%;
    max-width: 360px;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .login-box h2 {
    font-size: 20px;
    margin-bottom: 8px;
  }
  .login-box p {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }
  .login-box input {
    margin-bottom: 12px;
  }
  .login-box button {
    width: 100%;
  }
  .login-error {
    color: var(--error);
    font-size: 13px;
    margin-top: 12px;
  }

  /* Chat */
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 48px);
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
  }
  .msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
  }
  .msg-bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-bot pre {
    background: var(--bg);
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 13px;
    margin: 8px 0;
  }
  .msg-bot code {
    font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    font-size: 13px;
  }
  .msg-bot p { margin-bottom: 8px; }
  .msg-bot p:last-child { margin-bottom: 0; }
  .chat-input {
    display: flex;
    gap: 8px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .chat-input input {
    flex: 1;
  }

  /* Status dot */
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.on { background: var(--success); }
  .status-dot.off { background: var(--error); }

  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar-header h1, .sidebar-header .version, .nav-label, .sidebar-footer { display: none; }
    .sidebar-nav a { justify-content: center; padding: 12px; }
    .main { margin-left: 60px; padding: 16px; }
  }
</style>
</head>
<body>
{% block body %}
{% if not hide_sidebar %}
<nav class="sidebar">
  <div class="sidebar-header">
    <img src="/logo.png" alt="" width="28" height="28">
    <div>
      <h1>OPENCARRIER</h1>
      <div class="version">v{{ version }}</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <a href="/" class="{% if page == 'overview' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      <span class="nav-label">概览</span>
    </a>
    <a href="/agents" class="{% if page == 'agents' or page == 'chat' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-label">对话</span>
    </a>
    <a href="/tasks" class="{% if page == 'tasks' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="nav-label">任务</span>
    </a>
    <a href="/brain" class="{% if page == 'brain' %}active{% endif %}">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1a9 9 0 0 1 9 9c0 3.9-2.4 7.1-5.5 8.8L12 23l-3.5-4.2C5.4 17.1 3 13.9 3 10a9 9 0 0 1 9-9z"/></svg>
      <span class="nav-label">大脑</span>
    </a>
  </div>
  <div class="sidebar-footer">
    {% if session_user %}
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span>{{ session_user }}</span>
      <a href="/logout">退出</a>
    </div>
    {% endif %}
  </div>
</nav>
<main class="main">
{% endif %}
{% block content %}{% endblock %}
{% if not hide_sidebar %}
</main>
{% endif %}
{% endblock %}
</body>
</html>
