<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OpenCarrier — 获取你的 AI 助理</title>
<script src="/vendor/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f8faf9;color:#333;min-height:100vh;-webkit-font-smoothing:antialiased}
.phase{display:none;min-height:100vh}
.phase.active{display:flex;flex-direction:column}

/* ── Phase 1: Landing ── */
.landing{align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:linear-gradient(160deg,#f0faf3 0%,#e8f5eb 50%,#f8faf9 100%)}
.landing .logo{font-size:48px;margin-bottom:8px}
.landing h1{font-size:28px;font-weight:800;color:#1a1a1a;margin-bottom:4px;letter-spacing:-0.5px}
.landing h1 span{color:#07c160}
.landing .tagline{font-size:15px;color:#666;margin-bottom:32px;line-height:1.6}
.clone-hero{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 2px 16px rgba(0,0,0,.08);width:100%;max-width:360px;margin-bottom:32px}
.clone-hero .avatar{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#07c160,#4cd964);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
.clone-hero h2{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.clone-hero .desc{font-size:14px;color:#888;line-height:1.6}
.btn-primary{background:#07c160;color:#fff;border:none;border-radius:24px;padding:14px 40px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:all .2s;box-shadow:0 4px 16px rgba(7,193,96,.3)}
.btn-primary:hover{background:#06ad56;transform:translateY(-1px);box-shadow:0 6px 20px rgba(7,193,96,.35)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none}

/* Agent list */
.agent-list{width:100%;max-width:360px;margin-bottom:24px}
.agent-list h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
.agent-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.05);cursor:pointer;transition:all .2s;display:flex;gap:14px;align-items:center;margin-bottom:10px}
.agent-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);transform:translateY(-1px)}
.agent-card:active{transform:translateY(0)}
.agent-avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#07c160,#4cd964);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.agent-card .info{flex:1;min-width:0}
.agent-card .info h4{font-size:14px;font-weight:600;color:#333;margin-bottom:2px}
.agent-card .info p{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Phase 2: Auth (polling) ── */
.auth{align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:#fff}
.auth h2{font-size:20px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.auth .sub{font-size:14px;color:#888;margin-bottom:24px}
.auth-status{width:100%;max-width:300px;margin:0 auto}
.spinner{width:40px;height:40px;border:3px solid #e0e0e0;border-top-color:#07c160;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.auth-status p{font-size:14px;color:#666;line-height:1.6}
.auth-success{color:#07c160;font-size:16px;font-weight:600}
.auth-success .check{font-size:48px;margin-bottom:8px;display:block}
.qr-area{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);display:inline-block;margin-bottom:16px}
.qr-area img{width:200px;height:200px;border-radius:8px;display:block;image-rendering:pixelated}
.qr-hint{font-size:13px;color:#999;margin-top:12px;line-height:1.6}
.qr-hint .pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#07c160;animation:pulse 1.5s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Hub agent card (desktop) */
.hub-list{width:100%;max-width:720px;margin-bottom:24px}
.hub-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;gap:20px;align-items:center;margin-bottom:14px;text-align:left}
.hub-card .info{flex:1;min-width:0}
.hub-card .info h4{font-size:16px;font-weight:600;color:#333;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.hub-card .info p{font-size:13px;color:#999;line-height:1.5}
.hub-card .qr-box{flex-shrink:0;text-align:center}
.hub-card .qr-box img{width:100px;height:100px;border-radius:8px;image-rendering:pixelated;display:block}
.hub-card .qr-box span{display:block;font-size:11px;color:#bbb;margin-top:4px}

/* ── Phase 3: Done ── */
.done{align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:linear-gradient(160deg,#f0faf3 0%,#e8f5eb 50%,#f8faf9 100%)}
.done .big-check{font-size:72px;margin-bottom:16px}
.done h2{font-size:24px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
.done p{font-size:15px;color:#666;line-height:1.6;margin-bottom:8px;max-width:340px}
.done .highlight{color:#07c160;font-weight:600}
.done .platform-hint{font-size:13px;color:#999;margin-top:16px;line-height:1.6}
.done .btn-close{margin-top:24px}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- === Phase 1: Landing === -->
<div id="p1" class="phase landing active">
  <div id="p1-content"></div>
</div>

<!-- === Phase 2: Auth === -->
<div id="p2" class="phase auth">
  <h2 id="auth-title">授权绑定</h2>
  <p class="sub" id="auth-sub">按提示完成授权，绑定你的 AI 分身</p>
  <div class="auth-status" id="auth-polling">
    <div class="spinner"></div>
    <p id="auth-status-text">正在获取授权链接...</p>
    <p id="auth-debug" style="font-size:11px;color:#bbb;margin-top:8px;word-break:break-all"></p>
  </div>
  <div id="auth-qr" class="hidden">
    <div class="qr-area"><div id="qr-img"></div></div>
    <p class="qr-hint" id="qr-hint">长按识别二维码完成授权</p>
  </div>
  <div id="auth-success" class="auth-success hidden">
    <span class="check">✅</span>
    <p id="auth-success-text">授权成功</p>
  </div>
</div>

<!-- === Phase 3: Done === -->
<div id="p3" class="phase done">
  <div class="big-check">🎉</div>
  <h2 id="done-title">绑定成功！</h2>
  <p id="done-desc"></p>
  <div id="done-platform-hint" class="platform-hint"></div>
  <button class="btn-primary btn-close" onclick="try{WeixinJSBridge.call('closeWindow')}catch(e){};try{window.close()}catch(e){};">关闭页面</button>
</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var cloneName = params.get('clone') || '';
  var activePlatform = '';

  // UA detection — wxwork must come before MicroMessenger (WeChat Work UA has both)
  var ua = navigator.userAgent;
  if (/wxwork/i.test(ua)) activePlatform = 'wecom';
  else if (/MicroMessenger/i.test(ua)) activePlatform = 'weixin';
  else if (/DingTalk/i.test(ua)) activePlatform = 'dingtalk';
  else if (/Feishu|Lark/i.test(ua)) activePlatform = 'feishu';
  else { try { activePlatform = localStorage.getItem('oc_active_platform') || ''; } catch(e) {} }
  if (!activePlatform) activePlatform = 'weixin';

  var currentBotId = '';
  var platformCredentials = {};
  var targetAgentName = cloneName;
  var cloneAccess = 'public';
  var accessVerified = false;
  var pollTimer = null;

  var platformConfig = {
    weixin:  { label: '微信',     color: '#07c160' },
    wecom:   { label: '企业微信', color: '#07c160' },
    feishu:  { label: '飞书',     color: '#3370ff' },
    dingtalk:{ label: '钉钉',     color: '#0089ff' },
  };

  // ── localStorage ──
  function savePendingAuth(state) {
    state.ts = Date.now();
    try { localStorage.setItem('oc_pending_auth', JSON.stringify(state)); } catch(e) {}
  }
  function loadPendingAuth() {
    try {
      var s = localStorage.getItem('oc_pending_auth');
      if (!s) return null;
      var p = JSON.parse(s);
      // Expire after 10 minutes
      if (p.ts && Date.now() - p.ts > 600000) { clearPendingAuth(); return null; }
      return p;
    } catch(e) { return null; }
  }
  function clearPendingAuth() {
    try { localStorage.removeItem('oc_pending_auth'); } catch(e) {}
  }

  // ── Helpers ──
  function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function emoji(name) {
    var map = {'customer-service':'🎧','writer':'✍️','analyst':'📊','assistant':'🤖','translator':'🌐','coder':'💻'};
    var n = (name||'').toLowerCase();
    for (var k in map) { if (n.indexOf(k) >= 0) return map[k]; }
    var emojis = ['🤖','🧠','💡','🌟','🎯','🔮','🦾','✨'];
    var h = 0; for (var i = 0; i < n.length; i++) h = ((h << 5) - h + n.charCodeAt(i)) | 0;
    return emojis[Math.abs(h) % emojis.length];
  }

  function showPhase(n) {
    document.querySelectorAll('.phase').forEach(function(p){p.classList.remove('active')});
    document.getElementById('p'+n).classList.add('active');
    window.scrollTo(0,0);
  }

  function api(method, path, body) {
    var opts = { method: method, headers: {'Content-Type': 'application/json'}, credentials: 'same-origin' };
    if (body) opts.body = JSON.stringify(body);
    var controller = new AbortController();
    opts.signal = controller.signal;
    var timeout = setTimeout(function(){ controller.abort(); }, 30000);
    return fetch(path, opts).then(function(r){
      clearTimeout(timeout);
      if (r.status >= 400) throw new Error('HTTP ' + r.status);
      return r.json().catch(function(){ return {}; });
    }).catch(function(e){ clearTimeout(timeout); throw e; });
  }

  function stopPoll() { if (pollTimer) clearInterval(pollTimer); pollTimer = null; }

  // ── Phase 1: Landing ──
  function initLanding() {
    // Resume pending auth (user came back from platform auth page)
    var pending = loadPendingAuth();
    if (pending) {
      targetAgentName = pending.agentName;
      activePlatform = pending.platform;
      resumeAuth(pending);
      return;
    }

    var el = document.getElementById('p1-content');
    var isPlatformBrowser = /MicroMessenger|Feishu|Lark|DingTalk|wxwork/i.test(ua);

    if (!isPlatformBrowser) {
      el.innerHTML =
        '<div class="logo">🤖</div>' +
        '<h1>Open<span>Carrier</span></h1>' +
        '<p class="tagline">用手机扫码，绑定你的 AI 分身</p>' +
        '<div class="hub-list" id="hub-list"><p style="font-size:14px;color:#999">加载中...</p></div>';
      api('GET', '/api/share/agents').then(function(res){
        var agents = res.agents || [];
        var listEl = document.getElementById('hub-list');
        if (!agents.length) {
          listEl.innerHTML = '<p style="font-size:14px;color:#999">暂无可用分身</p>';
          return;
        }
        listEl.innerHTML = '';
        var base = location.origin + '/share';
        agents.forEach(function(a){
          var name = a.name || a.id || '';
          var displayName = a.display_name || name;
          var desc = a.description || a.profile || '';
          var shareUrl = base + '?clone=' + encodeURIComponent(name);
          var card = document.createElement('div');
          card.className = 'hub-card';
          card.innerHTML =
            '<div class="agent-avatar">' + emoji(displayName) + '</div>' +
            '<div class="info"><h4>' + esc(displayName) + '</h4><p>' + esc(desc) + '</p></div>' +
            '<div class="qr-box"><div id="hub-qr-' + name.replace(/[^a-zA-Z0-9]/g,'_') + '"></div><span>扫码使用</span></div>';
          listEl.appendChild(card);
          // Render QR code
          var qrContainer = document.getElementById('hub-qr-' + name.replace(/[^a-zA-Z0-9]/g,'_'));
          if (qrContainer && typeof qrcode === 'function') {
            try {
              var qr = qrcode(0, 'M');
              qr.addData(shareUrl);
              qr.make();
              qrContainer.innerHTML = qr.createImgTag(3, 4);
              var img = qrContainer.querySelector('img');
              if (img) { img.style.width = '100px'; img.style.height = '100px'; img.style.imageRendering = 'pixelated'; img.style.borderRadius = '8px'; }
            } catch(e) {}
          }
        });
      }).catch(function(e){
        document.getElementById('hub-list').innerHTML = '<p style="font-size:14px;color:#e08838">加载失败</p>';
      });
      return;
    }

    if (cloneName) {
      showCloneHero(el, cloneName);
      return;
    }

    el.innerHTML =
      '<div class="logo">🤖</div>' +
      '<h1>Open<span>Carrier</span></h1>' +
      '<p class="tagline">选择一个 AI 分身开始使用</p>' +
      '<div class="agent-list" id="agent-list"><p style="font-size:14px;color:#999">加载中...</p></div>';
    api('GET', '/api/share/agents').then(function(res){
      var agents = res.agents || [];
      var listEl = document.getElementById('agent-list');
      if (!agents.length) {
        listEl.innerHTML = '<p style="font-size:14px;color:#999">暂无可用分身</p>';
        return;
      }
      listEl.innerHTML = '<h3>可用分身</h3>';
      agents.forEach(function(a){
        var card = document.createElement('div');
        card.className = 'agent-card';
        var name = a.display_name || a.name || a.id || '';
        var desc = a.description || a.profile || '';
        card.innerHTML =
          '<div class="agent-avatar">' + emoji(name) + '</div>' +
          '<div class="info"><h4>' + esc(name) + '</h4><p>' + esc(desc) + '</p></div>';
        card.onclick = function(){
          targetAgentName = name;
          startAuth();
        };
        listEl.appendChild(card);
      });
    }).catch(function(e){
      document.getElementById('agent-list').innerHTML = '<p style="font-size:14px;color:#e08838">加载失败</p>';
    });
  }

  function showCloneHero(el, name) {
    el.innerHTML =
      '<div class="logo">' + emoji(name) + '</div>' +
      '<h1>Open<span>Carrier</span></h1>' +
      '<p class="tagline">获取你的专属 AI 分身</p>' +
      '<div class="clone-hero">' +
        '<div class="avatar">' + emoji(name) + '</div>' +
        '<h2 id="clone-display-name">' + esc(name) + '</h2>' +
        '<p class="desc">点击开始使用</p>' +
      '</div>' +
      '<div id="password-area" style="display:none;margin-bottom:16px;width:100%;max-width:340px">' +
        '<input type="password" id="clone-password" placeholder="输入访问密码" style="width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:14px;font-size:15px;outline:none;text-align:center" onkeydown="if(event.key===\'Enter\')verifyPassword()">' +
        '<p id="password-error" style="color:#e08838;font-size:13px;margin-top:8px;display:none"></p>' +
      '</div>' +
      '<button class="btn-primary" id="btn-start" onclick="startAuth()">开始使用</button>';
    api('GET', '/api/clones/' + encodeURIComponent(name) + '/access').then(function(data){
      if (data.error) {
        el.querySelector('.clone-hero .desc').textContent = '分身不存在';
        document.getElementById('btn-start').disabled = true;
        return;
      }
      cloneAccess = data.access || 'public';
      if (data.requires_password) {
        document.getElementById('password-area').style.display = 'block';
        document.getElementById('btn-start').textContent = '验证密码';
        document.getElementById('btn-start').onclick = function(){ verifyPassword(); };
      }
    }).catch(function(){});
  }

  // ── Password ──
  window.verifyPassword = function() {
    var pw = document.getElementById('clone-password').value.trim();
    if (!pw) return;
    var errEl = document.getElementById('password-error');
    var btn = document.getElementById('btn-start');
    btn.disabled = true;
    btn.textContent = '验证中...';
    errEl.style.display = 'none';
    api('POST', '/api/clones/' + encodeURIComponent(cloneName) + '/verify-access', {password: pw}).then(function(data){
      if (data.ok) {
        accessVerified = true;
        cloneAccess = 'public';
        document.getElementById('password-area').style.display = 'none';
        btn.textContent = '开始使用';
        btn.disabled = false;
        btn.onclick = function(){ startAuth(); };
      } else {
        errEl.textContent = data.error || '密码错误';
        errEl.style.display = 'block';
        btn.textContent = '验证密码';
        btn.disabled = false;
      }
    }).catch(function(e){
      errEl.textContent = '验证失败: ' + e.message;
      errEl.style.display = 'block';
      btn.textContent = '验证密码';
      btn.disabled = false;
    });
  };

  // ── Auth ──
  window.startAuth = function() {
    if (!targetAgentName && !cloneName) { alert('分身名称缺失'); return; }
    if (!targetAgentName) targetAgentName = cloneName;
    if (cloneAccess === 'private' && !accessVerified) {
      verifyPassword();
      return;
    }
    beginAuth(activePlatform);
  };

  function beginAuth(platform) {
    showPhase(2);
    var cfg = platformConfig[platform] || {};
    document.getElementById('auth-title').textContent = cfg.label + '授权绑定';
    document.getElementById('auth-polling').classList.remove('hidden');
    document.getElementById('auth-success').classList.add('hidden');
    document.getElementById('auth-status-text').textContent = '正在获取授权链接...';

    if (platform === 'weixin') {
      api('GET', '/api/weixin/qrcode').then(function(data){
        if (data.error) throw new Error(data.error);
        var qrContent = (data.data || {}).qrcode_img_content || '';
        var qrcodeToken = (data.data || {}).qrcode || '';
        var tenant = data.tenant || 'share';
        // Render QR on page — user long-presses to scan in WeChat
        document.getElementById('auth-polling').classList.add('hidden');
        document.getElementById('auth-qr').classList.remove('hidden');
        if (qrContent && typeof qrcode === 'function') {
          try {
            var qr = qrcode(0, 'M');
            qr.addData(qrContent);
            qr.make();
            document.getElementById('qr-img').innerHTML = qr.createImgTag(6, 8);
            var img = document.getElementById('qr-img').querySelector('img');
            if (img) { img.style.width = '200px'; img.style.height = '200px'; img.style.imageRendering = 'pixelated'; img.style.borderRadius = '8px'; }
          } catch(e) {
            document.getElementById('qr-img').innerHTML = '<p style="color:#999;font-size:13px">二维码生成失败</p>';
          }
        }
        pollWeixin(qrcodeToken, tenant);
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + e.message;
      });
    } else if (platform === 'wecom') {
      api('POST', '/api/bots/wecom/smartbot/generate', {}).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'wecom', agentName: targetAgentName, sessionData: { scode: res.scode } });
        location.href = res.auth_url;
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    } else if (platform === 'feishu') {
      api('POST', '/api/bots/feishu/device-auth', {}).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'feishu', agentName: targetAgentName, sessionData: { session_id: res.session_id } });
        document.getElementById('auth-status-text').textContent = '正在跳转飞书授权...';
        location.href = res.auth_url;
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    } else if (platform === 'dingtalk') {
      api('POST', '/api/bots/dingtalk/device-auth', {}).then(function(res){
        if (!res.auth_url) throw new Error('未返回授权链接');
        savePendingAuth({ platform: 'dingtalk', agentName: targetAgentName, sessionData: { session_id: res.session_id } });
        document.getElementById('auth-status-text').textContent = '请在新窗口完成钉钉授权';
        window.open(res.auth_url, '_blank');
        pollDingtalk(res.session_id);
      }).catch(function(e){
        document.getElementById('auth-status-text').textContent = '错误: ' + (e.message || '生成链接失败');
      });
    }
  }

  // ── Resume auth (user came back from platform auth page) ──
  function resumeAuth(pending) {
    showPhase(2);
    var cfg = platformConfig[pending.platform] || {};
    document.getElementById('auth-title').textContent = cfg.label + '授权绑定';
    document.getElementById('auth-polling').classList.remove('hidden');
    document.getElementById('auth-success').classList.add('hidden');
    document.getElementById('auth-status-text').textContent = '正在验证' + cfg.label + '授权结果...';
    var dbgEl = document.getElementById('auth-debug');
    if (dbgEl) dbgEl.textContent = 'resume platform=' + pending.platform + ' age=' + (pending.ts ? Math.round((Date.now()-pending.ts)/1000) + 's' : 'old');

    var sd = pending.sessionData || {};
    if (pending.platform === 'weixin') {
      // WeChat doesn't redirect — shouldn't have pending auth. Clear and go to landing.
      clearPendingAuth(); initLanding(); return;
    }
    else if (pending.platform === 'wecom') pollWecom(sd.scode);
    else if (pending.platform === 'feishu') pollFeishu(sd.session_id);
    else if (pending.platform === 'dingtalk') pollDingtalk(sd.session_id);
  }

  // ── Poll error helper ──
  // HTTP 400 = session expired/gone (server restarted or session cleaned up)
  // 3 consecutive errors → show timeout with retry
  function makePollCatch(label, started) {
    var errCount = 0;
    return function(e) {
      errCount++;
      var msg = (e && e.message) || String(e);
      var dbgEl = document.getElementById('auth-debug');
      if (dbgEl) dbgEl.textContent = label + ' ERR#' + errCount + ': ' + msg;
      // Session gone → no point retrying
      if (msg.indexOf('HTTP 400') >= 0) {
        stopPoll(); clearPendingAuth(); showAuthTimeout('会话已失效，请重新授权');
        return;
      }
      // Too many consecutive errors
      if (errCount >= 5) {
        stopPoll(); clearPendingAuth(); showAuthTimeout('连接失败，请重试');
      }
    };
  }

  // ── WeChat poll ──
  function pollWeixin(qrcode, tenant) {
    var started = Date.now();
    var errHandler = makePollCatch('weixin', started);
    function doPoll() {
      var url = '/api/weixin/qrcode-status?tenant=' + encodeURIComponent(tenant);
      if (qrcode) url += '&qrcode=' + encodeURIComponent(qrcode);
      api('GET', url).then(function(data){
        var status = data.status || (data.data && data.data.status);
        if (status === 'confirmed' || status === 'scaned_confirmed') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('微信授权成功');
          createBotAndBind('weixin', tenant, {
            ilink_bot_id: data.ilink_bot_id || '', ilink_user_id: data.ilink_user_id || '',
            bot_token: data.bot_token || '', baseurl: data.baseurl || ''
          });
        } else if (status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, 2000);
  }

  // ── WeCom poll ──
  function pollWecom(scode) {
    var started = Date.now();
    var errHandler = makePollCatch('wecom', started);
    function doPoll() {
      api('GET', '/api/bots/wecom/smartbot/poll?scode=' + encodeURIComponent(scode)).then(function(res){
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('企业微信授权成功');
          platformCredentials.wecom = { bot_id: res.bot_id || '', secret: res.secret || '' };
          createBotAndBind('wecom');
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, 2000);
  }

  // ── Feishu poll ──
  function pollFeishu(sessionId) {
    var interval = 3000;
    var started = Date.now();
    var errHandler = makePollCatch('feishu', started);
    function doPoll() {
      api('GET', '/api/bots/feishu/device-auth/poll?session_id=' + encodeURIComponent(sessionId)).then(function(res){
        var elapsed = Math.round((Date.now() - started) / 1000);
        var dbgEl = document.getElementById('auth-debug');
        if (dbgEl) dbgEl.textContent = 'feishu poll (' + elapsed + 's) ' + JSON.stringify(res).substring(0, 200);
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('飞书授权成功');
          platformCredentials.feishu = { app_id: res.app_id || '', app_secret: res.app_secret || '' };
          createBotAndBind('feishu');
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        } else if (res.raw_feishu && res.raw_feishu.error === 'slow_down') {
          interval = Math.min(interval + 2000, 10000); stopPoll();
          pollTimer = setInterval(doPoll, interval);
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, interval);
  }

  // ── DingTalk poll ──
  function pollDingtalk(sessionId) {
    var interval = 3000;
    var started = Date.now();
    var errHandler = makePollCatch('dingtalk', started);
    function doPoll() {
      api('GET', '/api/bots/dingtalk/device-auth/poll?session_id=' + encodeURIComponent(sessionId)).then(function(res){
        if (res.status === 'success') {
          stopPoll(); clearPendingAuth(); showAuthSuccess('钉钉授权成功');
          platformCredentials.dingtalk = { client_id: res.client_id || '', client_secret: res.client_secret || '' };
          createBotAndBind('dingtalk');
        } else if (res.status === 'expired') {
          stopPoll(); clearPendingAuth(); showAuthTimeout('授权已过期');
        } else if (Date.now() - started > 120000) {
          stopPoll(); clearPendingAuth(); showAuthTimeout('等待超时');
        } else if (res.raw_dingtalk && res.raw_dingtalk.error === 'slow_down') {
          interval = Math.min(interval + 2000, 10000); stopPoll();
          pollTimer = setInterval(doPoll, interval);
        }
      }).catch(errHandler);
    }
    doPoll();
    pollTimer = setInterval(doPoll, interval);
  }

  function showAuthSuccess(text) {
    document.getElementById('auth-polling').classList.add('hidden');
    document.getElementById('auth-qr').classList.add('hidden');
    document.getElementById('auth-success').classList.remove('hidden');
    document.getElementById('auth-success-text').textContent = text;
  }

  function showAuthTimeout(reason) {
    stopPoll();
    clearPendingAuth();
    document.getElementById('auth-polling').classList.add('hidden');
    document.getElementById('auth-qr').classList.add('hidden');
    document.getElementById('auth-success').classList.remove('hidden');
    document.getElementById('auth-success').innerHTML =
      '<span style="font-size:48px;display:block;margin-bottom:8px">⏳</span>' +
      '<p style="color:#e08838;font-size:16px;font-weight:600">' + reason + '</p>' +
      '<p style="color:#999;font-size:13px;margin-top:8px">点击下方按钮重新授权</p>' +
      '<button class="btn-primary" id="btn-retry" style="margin-top:16px">重新开始</button>';
    document.getElementById('btn-retry').addEventListener('click', function(){
      document.getElementById('auth-success').classList.add('hidden');
      document.getElementById('auth-success').innerHTML = '<span class="check">✅</span><p id="auth-success-text">授权成功</p>';
      showPhase(1);
      initLandingClean();
    });
  }

  // Re-init without checking stale pending auth
  window.initLandingClean = function() {
    var el = document.getElementById('p1-content');
    var isPlatformBrowser = /MicroMessenger|Feishu|Lark|DingTalk|wxwork/i.test(navigator.userAgent);
    if (cloneName && isPlatformBrowser) {
      showCloneHero(el, cloneName);
    } else if (cloneName) {
      showCloneHero(el, cloneName);
    } else {
      el.innerHTML =
        '<div class="logo">🤖</div>' +
        '<h1>Open<span>Carrier</span></h1>' +
        '<p class="tagline">获取你的专属 AI 分身</p>';
    }
  };

  // ── Create bot and bind ──
  function createBotAndBind(platform, weixinBotName, ilinkData) {
    var botName = targetAgentName + '-' + platform;
    var payload = { name: botName, platform: platform };

    if (platform === 'weixin') {
      payload.mode = 'ilink';
      if (ilinkData && ilinkData.ilink_user_id) payload.ilink_user_id = ilinkData.ilink_user_id;
      if (ilinkData && ilinkData.bot_token) payload.bot_token = ilinkData.bot_token;
    } else if (platform === 'wecom') {
      payload.mode = 'smartbot';
      var c = platformCredentials.wecom || {};
      if (c.bot_id) payload.bot_id = c.bot_id;
      if (c.secret) payload.secret = c.secret;
    } else if (platform === 'feishu') {
      var fc = platformCredentials.feishu || {};
      if (fc.app_id) payload.app_id = fc.app_id;
      if (fc.app_secret) payload.app_secret = fc.app_secret;
      payload.brand = 'feishu';
    } else if (platform === 'dingtalk') {
      var dc = platformCredentials.dingtalk || {};
      if (dc.client_id) payload.app_key = dc.client_id;
      if (dc.client_secret) payload.app_secret = dc.client_secret;
    }

    if (platform === 'weixin' && ilinkData && ilinkData.bot_token) {
      api('POST', '/api/weixin/save-token', {
        tenant_name: weixinBotName, bot_token: ilinkData.bot_token,
        ilink_bot_id: ilinkData.ilink_bot_id, ilink_user_id: ilinkData.ilink_user_id,
        baseurl: ilinkData.baseurl
      }).catch(function(){});
    }

    api('POST', '/api/bots', payload).then(function(res){
      currentBotId = res.bot_id || '';
      bindClone(platform, weixinBotName);
    }).catch(function(){
      bindClone(platform, weixinBotName);
    });
  }

  function bindClone(platform, weixinBotName) {
    var bindUrl, method;
    if (platform === 'weixin' && weixinBotName) {
      bindUrl = '/api/weixin/' + encodeURIComponent(weixinBotName) + '/bind';
      method = 'POST';
    } else if (currentBotId) {
      bindUrl = '/api/bots/' + encodeURIComponent(currentBotId) + '/bind';
      method = 'PUT';
    } else { showDone(); return; }

    api(method, bindUrl, { agent_name: targetAgentName }).then(function(){
      showDone();
    }).catch(function(){ showDone(); });
  }

  function showDone() {
    document.getElementById('done-title').textContent = '绑定成功！';
    document.getElementById('done-desc').innerHTML =
      '你已成功绑定分身 <span class="highlight">' + esc(targetAgentName) + '</span>';
    var hints = {
      weixin: '返回微信聊天窗口，给机器人发条消息，分身就会回复你。<br><span style="color:#e08838">微信需每 24 小时内至少发一条消息保持在线</span>',
      wecom: '返回企业微信聊天窗口，给机器人发条消息开始对话',
      feishu: '返回飞书聊天窗口，给机器人发条消息开始对话',
      dingtalk: '返回钉钉聊天窗口，给机器人发条消息开始对话',
    };
    document.getElementById('done-platform-hint').innerHTML = hints[activePlatform] || '';
    setTimeout(function(){ showPhase(3); }, 800);
  }

  // ── Init ──
  initLanding();
})();
</script>
