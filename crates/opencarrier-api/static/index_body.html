<body x-data="app">

<!-- Auth Prompt -->
<div x-show="$store.app.showAuthPrompt" x-cloak
     style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;max-width:400px;width:90%">
    <div x-show="$store.app.authMode === 'session'">
      <h3 style="margin:0 0 0.5rem;font-size:1.1rem">登录</h3>
      <p style="color:var(--text-dim);font-size:0.85rem;margin:0 0 1rem">请输入管理面板的账号密码。</p>
      <input type="text" x-model="$store.app._loginUser" placeholder="用户名" autocomplete="username"
             style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.5rem">
      <input type="password" x-model="$store.app._loginPass" placeholder="密码" autocomplete="current-password"
             @keydown.enter="$store.app.sessionLogin($store.app._loginUser, $store.app._loginPass)"
             style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.75rem">
      <button @click="$store.app.sessionLogin($store.app._loginUser, $store.app._loginPass)"
              style="width:100%;padding:0.6rem;border-radius:6px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:0.9rem">登录</button>
    </div>
    <div x-show="$store.app.authMode === 'apikey'">
      <h3 style="margin:0 0 0.5rem;font-size:1.1rem">需要 API 密钥</h3>
      <p style="color:var(--text-dim);font-size:0.85rem;margin:0 0 1rem">请输入 API 密钥。</p>
      <input type="password" x-model="$store.app._apiKey" placeholder="输入 API 密钥..."
             @keydown.enter="$store.app.submitApiKey($store.app._apiKey)"
             style="width:100%;padding:0.6rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:0.9rem;box-sizing:border-box;margin-bottom:0.75rem">
      <button @click="$store.app.submitApiKey($store.app._apiKey)"
              style="width:100%;padding:0.6rem;border-radius:6px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:0.9rem">解锁</button>
    </div>
  </div>
</div>

<div class="app-layout" :class="{ 'focus-mode': $store.app.focusMode }">
  <!-- Sidebar -->
  <nav class="sidebar" :class="{ collapsed: sidebarCollapsed, 'mobile-menu-open': mobileMenuOpen }">
    <div class="sidebar-header">
      <div class="sidebar-header-text">
        <div class="sidebar-logo">
          <img src="/logo.png" alt="OpenCarrier" width="28" height="28">
          <div>
            <h1>OPENCARRIER</h1>
            <div class="version" x-text="'v' + version"></div>
          </div>
        </div>
      </div>
    </div>
